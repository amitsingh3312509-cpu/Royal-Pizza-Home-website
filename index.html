<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:22px;font-weight:bold;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
}

button{
width:100%;padding:12px;margin-top:6px;
border:none;border-radius:6px;color:white;
}

.add-btn{background:#ff4da6;}
.submit-btn{background:black;}
.download{background:#ff4da6;}

.cart{background:#eee;padding:10px;margin-top:10px;}

.note{color:red;text-align:center;font-weight:bold;}

.msg{color:green;text-align:center;font-weight:bold;margin-top:10px;}

.remove-btn{
background:red;color:white;border:none;
padding:3px 8px;border-radius:4px;margin-left:5px;
}

</style>

</head>

<body>

<div class="header">🍕 Royal Pizza Home Bansdih / रॉयल पिज़्ज़ा होम बांसडीह</div>

<div class="container">

<form id="form" action="https://formsubmit.co/vimleshsingh64621@gmail.com" method="POST">

<h3>🍕 Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza / पिज़्ज़ा चुनें</option>
<option value="120">Small Veg Pizza ₹120 / छोटा वेज पिज़्ज़ा</option>
<option value="180">Medium Veg Pizza ₹180 / मीडियम वेज पिज़्ज़ा</option>
<option value="250">Large Cheese Pizza ₹250 / बड़ा चीज़ पिज़्ज़ा</option>
<option value="300">Special Paneer Pizza ₹300 / स्पेशल पनीर पिज़्ज़ा</option>
</select>

<input type="number" id="qty" value="1" placeholder="Quantity / मात्रा">

<button type="button" class="add-btn" onclick="addCart()">Add To Cart / जोड़ें</button>

<div class="cart">
<div id="cart"></div>
<p>Total / कुल ₹ <span id="total">0</span></p>
<p>Delivery Charge / डिलीवरी चार्ज ₹ <span id="delivery">0</span></p>
<p>Final / कुल भुगतान ₹ <span id="final">0</span></p>
<p>Advance / एडवांस ₹ <span id="adv">0</span></p>
</div>

<h3>Customer Details / ग्राहक जानकारी</h3>

<input name="Name" id="name" placeholder="Name / नाम" required>
<input name="Mobile" id="mobile" placeholder="Mobile / मोबाइल" required>

<select name="Village" id="village" required onchange="showDetails()">

<option value="">Select Village / गांव चुनें</option>

<option value="Kewtallia Kala / केवटलिया कला" data-time="30" data-charge="30">
Kewtallia Kala / केवटलिया कला (30 min | ₹30)
</option>

<option value="Kewtallia Khurd / केवटलिया खुर्द" data-time="35" data-charge="35">
Kewtallia Khurd / केवटलिया खुर्द (35 min | ₹35)
</option>

<option value="Aadar / आदर" data-time="25" data-charge="20">
Aadar / आदर (25 min | ₹20)
</option>

<option value="Dadar / ददर" data-time="30" data-charge="25">
Dadar / ददर (30 min | ₹25)
</option>

<option value="Dewdih / देउडीह" data-time="40" data-charge="40">
Dewdih / देउडीह (40 min | ₹40)
</option>

<option value="Bansdih / बांसडीह" data-time="20" data-charge="10">
Bansdih / बांसडीह (20 min | ₹10)
</option>

<option value="Vidya Bhawan Narayanpur / विद्या भवन नारायणपुर" data-time="25" data-charge="30">
Vidya Bhawan Narayanpur / विद्या भवन नारायणपुर (25 min | ₹30)
</option>

<option value="Chhotaki Seriya / छोटकी सेरिया" data-time="25" data-charge="20">
Chhotaki Seriya / छोटकी सेरिया (25 min | ₹20)
</option>

<option value="Sultanpur / सुल्तानपुर" data-time="35" data-charge="30">
Sultanpur / सुल्तानपुर (35 min | ₹30)
</option>

</select>

<p id="info"></p>

<p class="note">⚠️ 50% Advance जरूरी है / compulsory</p>

<h3>Payment / भुगतान</h3>

<p style="text-align:center;">UPI: 7309277213@ibl</p>

<input name="TransactionID" id="txn" placeholder="Transaction ID / ट्रांजैक्शन आईडी" required>

<input type="hidden" name="FullReceipt" id="fullReceipt">

<button type="submit" class="submit-btn">Submit Order / ऑर्डर करें</button>

</form>

<button class="download" onclick="downloadPDF()">Download Receipt / रसीद डाउनलोड</button>

<p id="msg" class="msg"></p>

</div>

<script>

let cart=[],total=0,delivery=0,time="";

/* ADD */
function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){alert("Select Pizza");return;}

cart.push({name,price,q});
total+=price*q;
update();
}

/* UPDATE */
function update(){
document.getElementById("cart").innerHTML="";

cart.forEach((c,index)=>{
document.getElementById("cart").innerHTML+=
c.name+" x"+c.q+" ₹"+(c.price*c.q)+
" <button class='remove-btn' onclick='removeItem("+index+")'>X</button><br>";
});

document.getElementById("total").innerText=total;
document.getElementById("delivery").innerText=delivery;

let final=total+delivery;
document.getElementById("final").innerText=final;
document.getElementById("adv").innerText=Math.round(final/2);
}

/* REMOVE */
function removeItem(index){
total -= cart[index].price * cart[index].q;
cart.splice(index,1);
update();
}

/* VILLAGE */
function showDetails(){
let v=document.getElementById("village");
time=v.options[v.selectedIndex].getAttribute("data-time");
delivery=v.options[v.selectedIndex].getAttribute("data-charge");

document.getElementById("info").innerText=
"Delivery Time / डिलीवरी समय: "+time+" min | Delivery Charge / चार्ज ₹"+delivery;

update();
}

/* SUBMIT */
document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

let v=document.getElementById("village");
let village=v.value;
let time=v.options[v.selectedIndex].getAttribute("data-time");
let charge=v.options[v.selectedIndex].getAttribute("data-charge");

let d=new Date();

/* EMAIL */
let final=total+delivery;
let adv=Math.round(final/2);

let fullData =
"ROYAL PIZZA RECEIPT\n\n"+
"Name / नाम: "+document.getElementById("name").value+"\n"+
"Mobile / मोबाइल: "+document.getElementById("mobile").value+"\n"+
"Village / गांव: "+village+"\n\n"+
"Total / कुल: ₹"+final+
"\nAdvance / एडवांस: ₹"+adv+
"\nDelivery Charge / चार्ज: ₹"+delivery+
"\nTxn ID: "+document.getElementById("txn").value+
"\nDate: "+d.toLocaleDateString()+
"\nDay: "+d.toLocaleDateString('en-US',{weekday:'long'})+
"\nTime: "+d.toLocaleTimeString()+
"\nDelivery Time: "+time+" min";

document.getElementById("fullReceipt").value=fullData;

/* MESSAGE */
document.getElementById("msg").innerText =
"✅ Order Submitted / ऑर्डर सफल\n\n" +
"🏡 Village / गांव: "+village+"\n\n" +
"⏱️ Delivery in "+time+" minutes / समय\n\n" +
"💰 Delivery Charge ₹"+charge+"\n\n" +
"🙏 Thank You / धन्यवाद";

/* 5 sec */
setTimeout(()=>{ this.submit(); },5000);

});

/* PDF */
function downloadPDF(){

const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

let d=new Date();

/* BORDER */
pdf.setDrawColor(255,105,180);
pdf.setLineWidth(3);
pdf.rect(5,5,200,287);

pdf.setDrawColor(0,150,255);
pdf.setLineWidth(1);
pdf.rect(10,10,190,277);

pdf.setFontSize(12);
pdf.text("Delivery Charge: ₹"+delivery,20,60);
pdf.text("Day: "+d.toLocaleDateString('en-US',{weekday:'long'}),20,70);

pdf.save("Receipt.pdf");

}

</script>

</body>
 </html>
