<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:22px;font-weight:bold;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
}

button{
width:100%;padding:12px;margin-top:6px;
border:none;border-radius:6px;color:white;
}

/* COLORS */
.add-btn{background:#ff4da6;}   /* Pink */
.submit-btn{background:black;}  /* Black */
.upi-btn{background:#28a745;}
.download{background:#ff3b3b;}

.cart{background:#eee;padding:10px;margin-top:10px;}

.note{color:red;text-align:center;font-weight:bold;}

.qr{width:220px;display:block;margin:auto;cursor:pointer;}

.msg{color:green;text-align:center;font-weight:bold;margin-top:10px;}

.bottom{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:15px;
}

.bottom a{
color:white;padding:8px 15px;border-radius:20px;
text-decoration:none;font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#ff3b3b;}

</style>

</head>

<body>

<div class="header">
🍕 Royal Pizza Home Bansdih
</div>

<div class="container">

<form id="form" action="https://formsubmit.co/amitsingh3312509@gmail.com" method="POST">

<h3>🍕 Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza / पिज़्ज़ा चुनें</option>
<option value="150">Veg Pizza ₹150</option>
<option value="200">Paneer Pizza ₹200</option>
<option value="250">Cheese Pizza ₹250</option>
</select>

<input type="number" id="qty" value="1">

<button type="button" class="add-btn" onclick="addCart()">
Add To Cart / कार्ट में जोड़ें
</button>

<div class="cart">
<div id="cart"></div>
<p>Total / कुल ₹ <span id="total">0</span></p>
<p>Advance 50% / अग्रिम ₹ <span id="adv">0</span></p>
</div>

<h3>👤 Customer Details / ग्राहक जानकारी</h3>

<input name="Name" id="name" placeholder="Name / नाम" required>
<input name="Mobile" id="mobile" placeholder="Mobile / मोबाइल" required>

<select name="Village" id="village" required>
<option value="">Select Village / गांव चुनें</option>

<option value="Seriya" data-time="25">Seriya (25 min)</option>
<option value="Bansdih" data-time="20">Bansdih (20 min)</option>
<option value="Halpur" data-time="30">Halpur (30 min)</option>
<option value="Kewtallia" data-time="35">Kewtallia (35 min)</option>
<option value="Asega" data-time="40">Asega (40 min)</option>

</select>

<p class="note">
⚠️ 50% advance payment compulsory  
⚠️ पहले भुगतान करें
</p>

<h3>💳 Payment / भुगतान</h3>

<img class="qr" src="PUT_QR_LINK_HERE" onclick="openUPI()">

<p style="text-align:center;">
Scan / Click to Pay / स्कैन करें
</p>

<p style="text-align:center;">
UPI: 7309277213@ibl
</p>

<button type="button" class="upi-btn" onclick="openUPI()">
📱 Open Payment App
</button>

<input name="TransactionID" id="txn" placeholder="Transaction ID / ट्रांजैक्शन आईडी" required>

<button type="submit" class="submit-btn">
Submit Order / ऑर्डर भेजें
</button>

</form>

<button class="download" onclick="downloadPDF()">
Download Receipt / रसीद डाउनलोड
</button>

<p id="msg" class="msg"></p>

</div>

<div class="bottom">
<a class="whatsapp" href="https://wa.me/9151041867">WhatsApp</a>
<a class="call" href="tel:7309277213">Call</a>
</div>

<script>

let cart=[],total=0;

/* CART */
function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){alert("Select Pizza");return;}

cart.push({name,price,q});
total+=price*q;
showCart();
}

function showCart(){
let box=document.getElementById("cart");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+"<br>";
});
document.getElementById("total").innerText=total;
document.getElementById("adv").innerText=Math.round(total/2);
}

/* UPI */
function openUPI(){
window.location.href="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR";
}

/* FORM SUBMIT */
document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

let select=document.getElementById("village");
let village=select.value;
let time=select.options[select.selectedIndex].getAttribute("data-time");

document.getElementById("msg").innerText=
"✅ Order Submitted / ऑर्डर सफल\n🏡 Village: "+village+
"\n⏱️ Delivery Time: "+time+" minutes";

// 2 sec बाद submit
setTimeout(()=>{
this.submit();
},2000);

});

/* PDF */
function downloadPDF(){

const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let village=document.getElementById("village").value;
let txn=document.getElementById("txn").value;

let d=new Date();

pdf.setTextColor(200,200,200);
pdf.setFontSize(35);
pdf.text("Royal Pizza Home Bansdih",10,100,{angle:45});

pdf.setTextColor(0,0,0);
pdf.setFontSize(12);

let y=20;

pdf.text("ROYAL PIZZA RECEIPT",20,y); y+=10;
pdf.text("Name: "+name,20,y); y+=8;
pdf.text("Mobile: "+mobile,20,y); y+=8;
pdf.text("Village: "+village,20,y); y+=8;

cart.forEach(c=>{
pdf.text(c.name+" x"+c.q+" ₹"+(c.price*c.q),20,y);
y+=8;
});

pdf.text("Total: ₹"+total,20,y); y+=8;
pdf.text("Advance: ₹"+Math.round(total/2),20,y); y+=8;

pdf.text("Txn: "+txn,20,y); y+=8;

pdf.text("Date: "+d.toLocaleDateString(),20,y); y+=8;
pdf.text("Time: "+d.toLocaleTimeString(),20,y);

pdf.save("Royal_Pizza_Receipt.pdf");

}

</script>

</body>
 </html>
