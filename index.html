
<!DOCTYPE html>
<html>
<head>
<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff512f,#dd2476);
margin:0;
}

.container{
max-width:520px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
color:#dd2476;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
}

button{
width:100%;
padding:12px;
border:none;
margin-top:10px;
font-size:16px;
}

.pay{
background:green;
color:white;
}

.submit{
background:#dd2476;
color:white;
}

.submit:disabled{
background:gray;
}

.total{
font-size:18px;
color:green;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>🍕 Royal Pizza Home</h2>

<form action="https://formsubmit.co/amitsingh3312509@gmail.com" method="POST">

<label>Name / नाम</label>
<input type="text" name="Name" required>

<label>Mobile / मोबाइल</label>
<input type="tel" name="Mobile" required>

<label>Village / गांव</label>
<input type="text" name="Village">

<label>Select Pizza / पिज़्ज़ा</label>

<select id="pizza" onchange="calculate()" name="Pizza">

<option value="">Select</option>
<option value="2">Margherita ₹2</option>
<option value="180">Veg Pizza ₹180</option>
<option value="200">Paneer Pizza ₹200</option>
<option value="250">Farmhouse ₹250</option>

</select>

<label>Quantity / मात्रा</label>
<input type="number" id="qty" value="1" min="1" onchange="calculate()" name="Quantity">

<label>Unit</label>

<select name="Unit">
<option>Piece / पीस</option>
<option>Plate / प्लेट</option>
</select>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<div class="total">
Advance ₹ <span id="advance">0</span>
</div>

<input type="hidden" name="Total Amount" id="totalInput">
<input type="hidden" name="Advance Payment" id="advanceInput">

<p><b>Date:</b> <span id="date"></span></p>
<p><b>Time:</b> <span id="time"></span></p>
<p><b>Day:</b> <span id="day"></span></p>
<p><b>Receipt No:</b> <span id="receipt"></span></p>

<input type="hidden" name="Date" id="dateInput">
<input type="hidden" name="Time" id="timeInput">
<input type="hidden" name="Day" id="dayInput">
<input type="hidden" name="Receipt" id="receiptInput">

<p>UPI ID : 7309277213@ibl</p>

<button type="button" class="pay" onclick="payUPI()">
Pay Advance
</button>

<button type="submit" class="submit" id="submitBtn" disabled>
Place Order
</button>

</form>

</div>

<script>

function calculate(){

let price=document.getElementById("pizza").value;
let qty=document.getElementById("qty").value;

let total=price*qty;

document.getElementById("total").innerText=total;

let adv=Math.round(total/2);

document.getElementById("advance").innerText=adv;

document.getElementById("totalInput").value=total;
document.getElementById("advanceInput").value=adv;

}

function payUPI(){

let amount=document.getElementById("advance").innerText;

if(amount==0){

alert("Please select pizza first");

return;

}

let upi="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&am="+amount+"&cu=INR";

window.location.href=upi;

setTimeout(function(){

alert("Payment done. Now place order");

document.getElementById("submitBtn").disabled=false;

},3000);

}

let d=new Date();

let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

document.getElementById("date").innerText=d.toLocaleDateString();
document.getElementById("time").innerText=d.toLocaleTimeString();
document.getElementById("day").innerText=days[d.getDay()];

document.getElementById("dateInput").value=d.toLocaleDateString();
document.getElementById("timeInput").value=d.toLocaleTimeString();
document.getElementById("dayInput").value=days[d.getDay()];

let receipt="RP"+Math.floor(Math.random()*1000000);

document.getElementById("receipt").innerText=receipt;
document.getElementById("receiptInput").value=receipt;

</script>

</body>
  </html>
